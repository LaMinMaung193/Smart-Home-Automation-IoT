<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Home System Architecture</title>
<style>
  :root {
    --color-bg: #f8f7f4;
    --color-card: #ffffff;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-text-tertiary: #9c9a92;
    --color-border: rgba(0,0,0,0.12);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1a1a18;
      --color-card: #232320;
      --color-text-primary: #e8e6df;
      --color-text-secondary: #b4b2a9;
      --color-text-tertiary: #6e6d66;
      --color-border: rgba(255,255,255,0.1);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--color-bg);
    font-family: system-ui, -apple-system, sans-serif;
    color: var(--color-text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }
  header {
    text-align: center;
    margin-bottom: 28px;
  }
  header h1 {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--color-text-primary);
  }
  header p {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-top: 4px;
  }
  .card {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 720px;
  }
  svg text { font-family: system-ui, -apple-system, sans-serif; }

  /* Color ramps — light mode */
  .c-gray rect, .c-gray circle, .c-gray ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th, .c-gray .t { fill: #444441; }
  .c-gray .ts { fill: #5F5E5A; }

  .c-blue rect, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue .th, .c-blue .t { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }

  .c-amber rect, .c-amber circle { fill: #FAEEDA; stroke: #BA7517; }
  .c-amber .th, .c-amber .t { fill: #633806; }
  .c-amber .ts { fill: #854F0B; }

  .c-teal rect, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th, .c-teal .t { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }

  .c-purple rect, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th, .c-purple .t { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }

  .c-red rect, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
  .c-red .th, .c-red .t { fill: #791F1F; }
  .c-red .ts { fill: #A32D2D; }

  .c-coral rect, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th, .c-coral .t { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }

  .th { font-size: 14px; font-weight: 500; }
  .t  { font-size: 14px; font-weight: 400; }
  .ts { font-size: 12px; font-weight: 400; }

  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }

  @media (prefers-color-scheme: dark) {
    .c-gray rect, .c-gray circle, .c-gray ellipse { fill: #444441; stroke: #B4B2A9; }
    .c-gray .th, .c-gray .t { fill: #D3D1C7; }
    .c-gray .ts { fill: #B4B2A9; }

    .c-blue rect, .c-blue circle { fill: #0C447C; stroke: #85B7EB; }
    .c-blue .th, .c-blue .t { fill: #B5D4F4; }
    .c-blue .ts { fill: #85B7EB; }

    .c-amber rect, .c-amber circle { fill: #633806; stroke: #EF9F27; }
    .c-amber .th, .c-amber .t { fill: #FAC775; }
    .c-amber .ts { fill: #EF9F27; }

    .c-teal rect, .c-teal circle { fill: #085041; stroke: #5DCAA5; }
    .c-teal .th, .c-teal .t { fill: #9FE1CB; }
    .c-teal .ts { fill: #5DCAA5; }

    .c-purple rect, .c-purple circle { fill: #3C3489; stroke: #AFA9EC; }
    .c-purple .th, .c-purple .t { fill: #CECBF6; }
    .c-purple .ts { fill: #AFA9EC; }

    .c-red rect, .c-red circle { fill: #791F1F; stroke: #F09595; }
    .c-red .th, .c-red .t { fill: #F7C1C1; }
    .c-red .ts { fill: #F09595; }

    .c-coral rect, .c-coral circle { fill: #712B13; stroke: #F0997B; }
    .c-coral .th, .c-coral .t { fill: #F5C4B3; }
    .c-coral .ts { fill: #F0997B; }

    .arr { stroke: #888780; }
  }
</style>
</head>
<body>
<header>
  <h1>Smart Home Automation — System Architecture</h1>
  <p>ESP32 Gateway · MQTT Broker · Backend · PLC · Sensors &amp; Actuators</p>
</header>
<div class="card">
<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Layer 1: Web Dashboard -->
<g class="c-purple">
  <rect x="220" y="20" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Web dashboard</text>
  <text class="ts" x="340" y="60" text-anchor="middle" dominant-baseline="central">HTML / CSS / JS + Chart.js</text>
</g>

<!-- Arrow: Dashboard <-> MQTT Broker -->
<line x1="340" y1="76" x2="340" y2="118" class="arr" marker-end="url(#arrow)" marker-start="url(#arrow)" stroke="#7F77DD"/>
<text class="ts" x="355" y="102" dominant-baseline="central" fill="#7F77DD">MQTT WebSocket</text>

<!-- Layer 2: MQTT Broker -->
<g class="c-teal">
  <rect x="205" y="118" width="270" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="140" text-anchor="middle" dominant-baseline="central">MQTT broker</text>
  <text class="ts" x="340" y="158" text-anchor="middle" dominant-baseline="central">HiveMQ public (port 1883 / WS)</text>
</g>

<!-- Arrow: MQTT <-> Backend -->
<line x1="250" y1="174" x2="155" y2="242" class="arr" marker-end="url(#arrow)" marker-start="url(#arrow)" stroke="#1D9E75"/>
<text class="ts" x="145" y="212" text-anchor="middle" dominant-baseline="central" fill="#1D9E75">MQTT</text>

<!-- Arrow: MQTT <-> ESP32 -->
<line x1="430" y1="174" x2="525" y2="242" class="arr" marker-end="url(#arrow)" marker-start="url(#arrow)" stroke="#1D9E75"/>
<text class="ts" x="535" y="212" text-anchor="middle" dominant-baseline="central" fill="#1D9E75">MQTT</text>

<!-- Layer 3L: Backend -->
<g class="c-blue">
  <rect x="40" y="242" width="210" height="72" rx="8" stroke-width="0.5"/>
  <text class="th" x="145" y="266" text-anchor="middle" dominant-baseline="central">Backend server</text>
  <text class="ts" x="145" y="284" text-anchor="middle" dominant-baseline="central">Node.js + Express</text>
  <text class="ts" x="145" y="300" text-anchor="middle" dominant-baseline="central">JWT auth · REST API</text>
</g>

<!-- Layer 3R: ESP32 -->
<g class="c-amber">
  <rect x="430" y="242" width="210" height="72" rx="8" stroke-width="0.5"/>
  <text class="th" x="535" y="266" text-anchor="middle" dominant-baseline="central">ESP32 gateway</text>
  <text class="ts" x="535" y="284" text-anchor="middle" dominant-baseline="central">Arduino framework</text>
  <text class="ts" x="535" y="300" text-anchor="middle" dominant-baseline="central">WiFi · MQTT · Modbus RTU</text>
</g>

<!-- Arrow: ESP32 <-> PLC via RS485 -->
<line x1="535" y1="314" x2="535" y2="382" class="arr" marker-end="url(#arrow)" marker-start="url(#arrow)" stroke="#BA7517"/>
<text class="ts" x="575" y="353" dominant-baseline="central" fill="#BA7517">RS485 / Modbus RTU</text>

<!-- Layer 4: PLC -->
<g class="c-coral">
  <rect x="370" y="382" width="330" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="535" y="404" text-anchor="middle" dominant-baseline="central">PLC (Mitsubishi FX)</text>
  <text class="ts" x="535" y="422" text-anchor="middle" dominant-baseline="central">Ladder logic · I/O control · heartbeat</text>
</g>

<!-- Arrow: PLC -> Sensors block -->
<line x1="535" y1="438" x2="535" y2="490" class="arr" marker-end="url(#arrow)" stroke="#993C1D"/>

<!-- Sensors / Actuators block -->
<g class="c-gray">
  <rect x="370" y="490" width="330" height="100" rx="8" stroke-width="0.5"/>
  <text class="th" x="535" y="514" text-anchor="middle" dominant-baseline="central">Sensors &amp; actuators</text>
  <text class="ts" x="430" y="536" text-anchor="middle" dominant-baseline="central">PIR · LDR · smoke</text>
  <text class="ts" x="430" y="554" text-anchor="middle" dominant-baseline="central">door · DS18B20</text>
  <text class="ts" x="612" y="536" text-anchor="middle" dominant-baseline="central">light · fan</text>
  <text class="ts" x="612" y="554" text-anchor="middle" dominant-baseline="central">buzzer</text>
</g>
<!-- Divider -->
<line x1="535" y1="500" x2="535" y2="582" stroke="#b4b2a9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="430" y="503" text-anchor="middle" dominant-baseline="central" fill="#888780">Inputs</text>
<text class="ts" x="612" y="503" text-anchor="middle" dominant-baseline="central" fill="#888780">Outputs</text>

<!-- MQTT topics legend box -->
<rect x="25" y="410" width="290" height="168" rx="8" fill="none" stroke="#b4b2a9" stroke-width="0.5" stroke-dasharray="5 4"/>
<text class="ts" x="36" y="428" dominant-baseline="central" fill="#888780">MQTT topics</text>
<text class="ts" x="36" y="452" dominant-baseline="central" fill="#5F5E5A">smarthome/plc1/status  →  dashboard</text>
<text class="ts" x="36" y="474" dominant-baseline="central" fill="#5F5E5A">smarthome/plc1/control  →  ESP32</text>
<text class="ts" x="36" y="496" dominant-baseline="central" fill="#5F5E5A">smarthome/plc1/ack  →  backend</text>
<text class="ts" x="36" y="524" dominant-baseline="central" fill="#5F5E5A">Publish interval: 3 s</text>
<text class="ts" x="36" y="544" dominant-baseline="central" fill="#5F5E5A">Fire override: blocks all commands</text>
<text class="ts" x="36" y="564" dominant-baseline="central" fill="#5F5E5A">Heartbeat: 5× miss → PLC offline</text>
</svg>
</div>
</body>
</html>
