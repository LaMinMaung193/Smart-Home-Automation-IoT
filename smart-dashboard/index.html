<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industrial SCADA Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
if (!localStorage.getItem("token")) {
  window.location.href = "login.html";
}
</script>

</head>

<body>

<div class="header">
  <div></div>

  <h1>🏭 Home Automation IoT Dashboard</h1>

  <div class="right">
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div id="fireAlert" class="alert hidden">🔥 FIRE DETECTED 🔥</div>
<div id="offlineAlert" class="offline hidden">⚠️ PLC OFFLINE</div>

<div class="grid">

<div class="card">
  <h2>System</h2>
  <p>PLC: <span id="plcStatus">-</span></p>
  <p>Mode: <span id="modeStatus">-</span></p>
  <p>Temp: <span id="tempStatus">-</span></p>
</div>

<div class="card">
  <h2>Sensors</h2>
  <p>PIR: <span id="pirStatus">-</span></p>
  <p>LDR: <span id="ldrStatus">-</span></p>
  <p>Door: <span id="doorStatus">-</span></p>
</div>

<div class="card">
  <h2>Devices</h2>
  <p>Light: <span id="lightStatus">-</span></p>
  <p>Fan: <span id="fanStatus">-</span></p>
  <p>Buzzer: <span id="buzzerStatus">-</span></p>
</div>

<div class="card">
  <h2>Temperature Trend</h2>
  <canvas id="tempChart"></canvas>
</div>

<div class="card">
  <h2>Control</h2>

  <button onclick="setMode(0)">AUTO</button>
  <button onclick="setMode(1)">MANUAL</button>

  <hr>

  <button id="lightOnBtn" onclick="controlDevice('light', true)">Light ON</button>
  <button onclick="controlDevice('light', false)">Light OFF</button>

  <button id="fanOnBtn" onclick="controlDevice('fan', true)">Fan ON</button>
  <button onclick="controlDevice('fan', false)">Fan OFF</button>

  <button id="buzzerOnBtn" onclick="controlDevice('buzzer', true)">Buzzer ON</button>
  <button onclick="controlDevice('buzzer', false)">Buzzer OFF</button>
</div>

<div class="card">
  <h2>LDR Trend</h2>
  <canvas id="ldrChart"></canvas>
</div>

</div>

<audio id="alarmSound" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

<script src="script.js"></script>
</body>
</html>
