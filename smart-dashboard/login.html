<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SCADA Login</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  font-family: Arial;
}

.login-box {
  background: #111827;
  padding: 40px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

h2 {
  color: #00eaff;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 6px;
  background: #1f2937;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  background: #00eaff;
  border: none;
  border-radius: 6px;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #00c4d6;
}

#error {
  color: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="error"></p>
</div>

<script>
async function login() {
  const btn = document.querySelector("button");
  btn.innerText = "Logging in...";
  btn.disabled = true;

  const res = await fetch("https://smart-home-automation-iot.onrender.com/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  if(res.ok) {
    const data = await res.json();
    localStorage.setItem("token", data.token);
    window.location.href = "index.html";
  } else {
    document.getElementById("error").innerText = "❌ Invalid credentials";
    btn.innerText = "Login";
    btn.disabled = false;
  }
}
</script>

</body>
</html>
